name: Build and Attach APK to Release

on:
  release:
    types: [published]

jobs:
  build_and_attach:
    name: Build APK and attach to release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./Android/src
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build
        run: ./gradlew assembleRelease
      - name: Find and rename APK
        id: find_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          cp "$APK_PATH" "pocket-ai-${{ github.event.release.tag_name }}.apk"
          echo "apk_name=pocket-ai-${{ github.event.release.tag_name }}.apk" >> "$GITHUB_OUTPUT"
      - name: Attach APK to release
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.find_apk.outputs.apk_name }}" --clobber
        working-directory: ./Android/src
        env:
          GH_TOKEN: ${{ github.token }}
